const INDUSTRIES = ["すべて","広告","ゲーム","メーカー","IT・Web","印刷・出版","映像・放送","デザイン","その他"];
const TYPES = ["すべて","インターン","説明会","セミナー","選考"];
const IND_COLORS = {"広告":{bg:"#EEF2FF",text:"#3730A3",dot:"#6366F1"},"ゲーム":{bg:"#F0FDF4",text:"#166534",dot:"#22C55E"},"メーカー":{bg:"#FFF7ED",text:"#9A3412",dot:"#F97316"},"IT・Web":{bg:"#F0F9FF",text:"#075985",dot:"#0EA5E9"},"印刷・出版":{bg:"#FDF4FF",text:"#6B21A8",dot:"#A855F7"},"映像・放送":{bg:"#FFF1F2",text:"#9F1239",dot:"#F43F5E"},"デザイン":{bg:"#ECFDF5",text:"#065F46",dot:"#10B981"},"その他":{bg:"#F8FAFC",text:"#475569",dot:"#94A3B8"}};

function daysUntil(d){if(!d)return 999;const t=new Date();t.setHours(0,0,0,0);return Math.ceil((new Date(d)-t)/86400000);}
function fmt(d){if(!d)return"—";const x=new Date(d);return`${x.getMonth()+1}/${x.getDate()}`;}
function fmtFull(d){if(!d)return"—";const x=new Date(d),w=["日","月","火","水","木","金","土"];return`${x.getFullYear()}/${x.getMonth()+1}/${x.getDate()}（${w[x.getDay()]}）`;}
function status(item){const d=daysUntil(item.deadline);return d<0?"終了":d<=3?"締切間近":"募集中";}

function Tag({industry}){const c=IND_COLORS[industry]||IND_COLORS["その他"];return <span style={{background:c.bg,color:c.text,padding:"2px 8px",borderRadius:99,fontSize:11,fontWeight:600,display:"inline-flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}><span style={{width:5,height:5,borderRadius:"50%",background:c.dot}}/>{industry}</span>;}
function Badge({s}){const m={"募集中":{bg:"#DCFCE7",text:"#166534"},"終了":{bg:"#F1F5F9",text:"#64748B"},"締切間近":{bg:"#FEF9C3",text:"#854D0E"}}[s]||{};return <span style={{background:m.bg,color:m.text,padding:"2px 8px",borderRadius:99,fontSize:11,fontWeight:600}}>{s}</span>;}
function Bar({v,max=40}){const p=Math.min(100,(v/max)*100);const c=p>60?"#2D5BE3":p>30?"#F97316":"#94A3B8";return <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{flex:1,height:3,background:"#F0F0EE",borderRadius:99,overflow:"hidden"}}><div style={{width:`${p}%`,height:"100%",background:c,borderRadius:99}}/></div><span style={{fontSize:10,color:"#AAA",minWidth:24,textAlign:"right"}}>{v}</span></div>;}

function Card({item,onClick}){const s=status(item);const d=daysUntil(item.deadline);return(
  <div onClick={()=>onClick(item)} style={{background:"#FFF",border:"1px solid #EBEBEB",borderRadius:12,padding:"13px 14px",cursor:"pointer",display:"flex",flexDirection:"column",gap:7}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 14px rgba(0,0,0,0.07)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
      <div style={{flex:1,minWidth:0}}><div style={{fontSize:11,color:"#AAA",marginBottom:1}}>{item.company}</div><div style={{fontSize:14,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</div></div>
      <Badge s={s}/>
    </div>
    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}><Tag industry={item.industry}/><span style={{fontSize:11,color:"#888",background:"#F5F5F3",padding:"2px 7px",borderRadius:99}}>{item.type}</span></div>
    <Bar v={item.score}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:11,color:"#BBB"}}>📅 {fmt(item.date)} &nbsp;⏰ {fmt(item.deadline)}</span>
      {s!=="終了"&&d<999&&<span style={{fontSize:12,fontWeight:700,color:d<=3?"#E3402D":"#2D5BE3"}}>{d===0?"本日締切":`あと${d}日`}</span>}
    </div>
  </div>
);}

function Modal({item,onClose}){if(!item)return null;const s=status(item);return(
  <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#FFF",borderRadius:"20px 20px 0 0",padding:"8px 22px 32px",width:"100%",maxWidth:560,maxHeight:"85vh",overflowY:"auto"}}>
      <div style={{width:32,height:4,background:"#DDD",borderRadius:99,margin:"12px auto 18px"}}/>
      <div style={{fontSize:11,color:"#AAA",marginBottom:2}}>{item.company}</div>
      <div style={{fontSize:18,fontWeight:800,marginBottom:10,lineHeight:1.3}}>{item.title}</div>
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}><Tag industry={item.industry}/><span style={{fontSize:11,color:"#888",background:"#F5F5F3",padding:"2px 7px",borderRadius:99}}>{item.type}</span><Badge s={s}/></div>
      <div style={{marginBottom:14}}><div style={{fontSize:11,color:"#AAA",marginBottom:3}}>人気スコア（登場回数×ソース信頼性）</div><Bar v={item.score}/></div>
      {[["開催日",fmtFull(item.date)],["応募締切",fmtFull(item.deadline)],["備考",item.note||"—"]].map(([l,v])=>(
        <div key={l} style={{display:"flex",gap:10,marginBottom:8}}><span style={{fontSize:11,color:"#AAA",width:56,flexShrink:0,paddingTop:2}}>{l}</span><span style={{fontSize:13,fontWeight:500}}>{v}</span></div>
      ))}
      {item.url&&<a href={item.url} target="_blank" rel="noreferrer" style={{display:"block",background:"#1A1A1A",color:"#FFF",textAlign:"center",padding:"12px 0",borderRadius:12,fontWeight:700,fontSize:14,textDecoration:"none",marginTop:8}}>採用ページを開く →</a>}
      <button onClick={onClose} style={{display:"block",width:"100%",marginTop:8,padding:"10px 0",background:"none",border:"none",color:"#BBB",fontSize:13,cursor:"pointer"}}>閉じる</button>
    </div>
  </div>
);}

function HomeTab({data,onSelect}){
  const upcoming=[...data].filter(d=>daysUntil(d.deadline)>=0).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)).slice(0,5);
  const top=[...data].filter(d=>status(d)!=="終了").sort((a,b)=>b.score-a.score).slice(0,5);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:24}}>
      <div><div style={{fontSize:10,fontWeight:700,color:"#BBB",letterSpacing:"0.1em",marginBottom:8}}>締切が近い順</div><div style={{display:"flex",flexDirection:"column",gap:7}}>{upcoming.map(d=><Card key={d.id} item={d} onClick={onSelect}/>)}</div></div>
      <div><div style={{fontSize:10,fontWeight:700,color:"#BBB",letterSpacing:"0.1em",marginBottom:8}}>人気スコア上位</div>
        {top.map((d,i)=><div key={d.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}><span style={{fontSize:15,fontWeight:900,color:i<3?"#2D5BE3":"#DDD",width:20,textAlign:"center",flexShrink:0}}>{i+1}</span><div style={{flex:1}}><Card item={d} onClick={onSelect}/></div></div>)}
      </div>
    </div>
  );
}

function ListTab({data,onSelect}){
  const [ind,setInd]=useState("すべて");
  const [typ,setTyp]=useState("すべて");
  const [q,setQ]=useState("");
  const [ended,setEnded]=useState(false);
  const [sort,setSort]=useState("score");
  const list=useMemo(()=>{
    let r=data.filter(d=>{
      if(ind!=="すべて"&&d.industry!==ind)return false;
      if(typ!=="すべて"&&d.type!==typ)return false;
      if(!ended&&status(d)==="終了")return false;
      if(q&&!`${d.company}${d.title}${d.industry}`.includes(q))return false;
      return true;
    });
    return sort==="score"?r.sort((a,b)=>b.score-a.score):r.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  },[ind,typ,q,ended,sort]);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="企業名・タイトルで検索" style={{padding:"9px 13px",border:"1.5px solid #EBEBEB",borderRadius:10,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box"}}/>
      <div style={{overflowX:"auto",display:"flex",gap:5,paddingBottom:2}}>{INDUSTRIES.map(i=><button key={i} onClick={()=>setInd(i)} style={{padding:"4px 10px",borderRadius:99,fontSize:11,fontWeight:700,border:"none",cursor:"pointer",whiteSpace:"nowrap",background:ind===i?"#1A1A1A":"#F0F0EE",color:ind===i?"#FFF":"#666"}}>{i}</button>)}</div>
      <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
        {TYPES.map(t=><button key={t} onClick={()=>setTyp(t)} style={{padding:"3px 9px",borderRadius:99,fontSize:11,fontWeight:600,border:"1.5px solid",cursor:"pointer",background:"none",borderColor:typ===t?"#1A1A1A":"#E0E0E0",color:typ===t?"#1A1A1A":"#BBB"}}>{t}</button>)}
        <select value={sort} onChange={e=>setSort(e.target.value)} style={{marginLeft:"auto",fontSize:11,border:"1.5px solid #E0E0E0",borderRadius:8,padding:"3px 7px",background:"#FFF",cursor:"pointer"}}>
          <option value="score">人気順</option><option value="deadline">締切順</option>
        </select>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:11,color:"#BBB"}}>{list.length}社</span>
        <label style={{fontSize:11,color:"#BBB",display:"flex",alignItems:"center",gap:3,cursor:"pointer"}}><input type="checkbox" checked={ended} onChange={e=>setEnded(e.target.checked)}/>終了済みも表示</label>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>{list.map(d=><Card key={d.id} item={d} onClick={onSelect}/>)}{list.length===0&&<div style={{color:"#CCC",fontSize:14,padding:"40px 0",textAlign:"center"}}>該当なし</div>}</div>
    </div>
  );
}

function CalTab({data}){
  const today=new Date();
  const [yr,setYr]=useState(today.getFullYear());
  const [mo,setMo]=useState(today.getMonth());
  const [sel,setSel]=useState(null);
  const mn=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const first=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const byDate=useMemo(()=>{const m={};COMPANIES.forEach(d=>{[d.date,d.deadline].forEach(ds=>{if(!ds)return;const k=ds.slice(0,10);const[y,mo2]=k.split("-").map(Number);if(y===yr&&mo2-1===mo){if(!m[k])m[k]=[];if(!m[k].find(x=>x.id===d.id))m[k].push(d);}});});return m;},[yr,mo]);
  const cells=[];for(let i=0;i<first;i++)cells.push(null);for(let i=1;i<=dim;i++)cells.push(i);
  const sk=sel?`${yr}-${String(mo+1).padStart(2,"0")}-${String(sel).padStart(2,"0")}`:null;
  const se=sk?(byDate[sk]||[]):[];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}} style={{background:"none",border:"1.5px solid #E0E0E0",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:15}}>‹</button>
        <span style={{fontWeight:800,fontSize:15}}>{yr}年 {mn[mo]}</span>
        <button onClick={()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}} style={{background:"none",border:"1.5px solid #E0E0E0",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:15}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {["日","月","火","水","木","金","土"].map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#CCC",padding:"3px 0"}}>{d}</div>)}
        {cells.map((day,i)=>{if(!day)return <div key={i}/>;const k=`${yr}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;const ev=byDate[k]||[];const isTd=yr===today.getFullYear()&&mo===today.getMonth()&&day===today.getDate();return(
          <div key={i} onClick={()=>setSel(day===sel?null:day)} style={{minHeight:40,borderRadius:7,padding:"3px 1px",cursor:ev.length?"pointer":"default",background:day===sel?"#EEF2FF":isTd?"#F0F9FF":"transparent",border:isTd?"2px solid #2D5BE3":"2px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <div style={{fontSize:12,fontWeight:isTd?800:400,color:isTd?"#2D5BE3":"#1A1A1A"}}>{day}</div>
            <div style={{display:"flex",gap:2,flexWrap:"wrap",justifyContent:"center"}}>{ev.slice(0,3).map((e,j)=>{const c=IND_COLORS[e.industry]||IND_COLORS["その他"];return <div key={j} style={{width:4,height:4,borderRadius:"50%",background:c.dot}}/>;})}</div>
          </div>
        );})}
      </div>
      {sel&&<div style={{background:"#F8F8F6",borderRadius:10,padding:12}}><div style={{fontSize:11,fontWeight:700,color:"#888",marginBottom:6}}>{mo+1}/{sel}</div>{se.length===0?<div style={{fontSize:12,color:"#CCC"}}>イベントなし</div>:se.map(e=><div key={e.id} style={{display:"flex",gap:8,alignItems:"center",padding:"5px 0",borderBottom:"1px solid #EBEBEB"}}><div style={{width:6,height:6,borderRadius:"50%",background:(IND_COLORS[e.industry]||IND_COLORS["その他"]).dot,flexShrink:0}}/><div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.company}</div><div style={{fontSize:10,color:"#888"}}>{e.title}</div></div><Tag industry={e.industry}/></div>)}</div>}
    </div>
  );
}


function SettingsTab({loading,lastUpdated,onReload,total}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{background:"#F0FDF4",borderRadius:12,padding:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#166534",marginBottom:4}}>✅ スプレッドシート連携済み</div>
        <div style={{fontSize:12,color:"#666"}}>{total}社収録 · 最終更新: {lastUpdated}</div>
      </div>
      <div style={{background:"#F0F5FF",borderRadius:12,padding:16,fontSize:13,lineHeight:1.8,color:"#3730A3"}}>
        <div style={{fontWeight:700,marginBottom:6}}>🔄 データ更新について</div>
        <div>毎朝8時に自動で企業情報が更新されます</div>
        <div>手動で今すぐ更新する場合は下のボタンを押してください</div>
      </div>
      <button onClick={onReload} disabled={loading}
        style={{background:loading?"#AAA":"#1A1A1A",color:"#FFF",border:"none",borderRadius:12,padding:"13px 0",fontWeight:700,fontSize:14,cursor:loading?"not-allowed":"pointer"}}>
        {loading?"更新中...":"今すぐ更新"}
      </button>
    </div>
  );
}

const GAS_URL = "https://script.google.com/macros/s/AKfycbzJV1i7q7SqcUBkekDcJccG7-t-GAMivaumzCvbKPp-w0I4O5faCxZ_xlCgzYu87Lw5/exec";

function App(){
  const [tab,setTab]=useState("home");
  const [sel,setSel]=useState(null);
  const [data,setData]=useState(COMPANIES);
  const [loading,setLoading]=useState(false);
  const [lastUpdated,setLastUpdated]=useState("（初期データ）");

  // GASからデータを取得
  function loadFromGAS() {
    setLoading(true);
    fetch(GAS_URL)
      .then(r => r.json())
      .then(json => {
        if (json.companies && json.companies.length > 0) {
          setData(json.companies);
          setLastUpdated(json.updatedAt || new Date().toLocaleString("ja-JP"));
        }
      })
      .catch(e => console.error("GAS取得失敗:", e))
      .finally(() => setLoading(false));
  }

  // 起動時に自動でGASからデータ取得
  useState(() => { loadFromGAS(); }, []);

  const TABS=[{id:"home",label:"ホーム",icon:"🏠"},{id:"list",label:"企業一覧",icon:"🏢"},{id:"calendar",label:"カレンダー",icon:"📅"},{id:"settings",label:"設定",icon:"⚙️"}];
  return(
    <div style={{background:"#F7F7F5",minHeight:"100vh",fontFamily:"'Helvetica Neue',Arial,'Hiragino Sans',sans-serif",maxWidth:560,margin:"0 auto"}}>
      <div style={{background:"#FFF",borderBottom:"1px solid #EBEBEB",padding:"13px 18px 9px",position:"sticky",top:0,zIndex:100}}>
        <div style={{fontSize:16,fontWeight:900,letterSpacing:"-0.03em"}}>美大就活<span style={{color:"#2D5BE3"}}>ナビ</span></div>
        <div style={{fontSize:9,color:"#CCC",letterSpacing:"0.08em"}}>ART SCHOOL CAREER NAVIGATOR · {COMPANIES.length}社収録</div>
      </div>
      <div style={{padding:"14px 13px 90px"}}>
        {tab==="home"&&<HomeTab data={data} onSelect={setSel}/>}
        {tab==="list"&&<ListTab data={data} onSelect={setSel}/>}
        {tab==="calendar"&&<CalTab data={data}/>}
        {tab==="settings"&&<SettingsTab loading={loading} lastUpdated={lastUpdated} onReload={loadFromGAS} total={data.length}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:560,background:"#FFF",borderTop:"1px solid #EBEBEB",display:"flex",zIndex:100}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",padding:"9px 0 11px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
          <span style={{fontSize:19}}>{t.icon}</span>
          <span style={{fontSize:9,fontWeight:700,color:tab===t.id?"#2D5BE3":"#CCC"}}>{t.label}</span>
        </button>)}
      </div>
      <Modal item={sel} onClose={()=>setSel(null)}/>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
